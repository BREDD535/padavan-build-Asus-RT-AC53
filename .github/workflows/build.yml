name: Build Padavan Gaming Firmware

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
    - name: Install System Dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y unzip libtool-bin curl cmake gperf gawk flex bison xxd fakeroot kmod cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin

    - name: Clone Source Code
      run: |
        git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u

    - name: Pull Precompiled Toolchain
      run: |
        cd /opt/rt-n56u/toolchain-mipsel
        chmod +x dl_toolchain.sh
        ./dl_toolchain.sh

    - name: Inject CoD Optimization Profile
      run: |
        TARGET_CONFIG="/opt/rt-n56u/trunk/configs/templates/PSG1218.config"
        
        set_config() {
          local key=$1
          local val=$2
          local file=$3
          if grep -q "^${key}=" "$file"; then
            sed -i "s|^${key}=.*|${key}=${val}|" "$file"
          else
            echo "${key}=${val}" >> "$file"
          fi
        }

        # Enable high-priority gaming paths
        set_config "CONFIG_FIRMWARE_INCLUDE_HW_NAT" "y" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_UPNP" "y" "$TARGET_CONFIG"

        # Disable heavy storage/VPN media applications to fit 8MB Flash limits
        set_config "CONFIG_FIRMWARE_INCLUDE_MINIDLNA" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_FIREFLY" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_TRANSMISSION" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_SSTP" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_OPENVPN" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_SAMBA" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_WINS" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_HTTPS" "n" "$TARGET_CONFIG"
        set_config "CONFIG_FIRMWARE_INCLUDE_SFTP" "n" "$TARGET_CONFIG"

    - name: Compile Custom Binary
      run: |
        cd /opt/rt-n56u/trunk
        fakeroot ./build_firmware_modify PSG1218

    - name: Package Firmware File
      uses: actions/upload-artifact@v4
      with:
        name: Padavan_RT-AC53_CoD_Edition
        path: /opt/rt-n56u/trunk/images/*.trx
